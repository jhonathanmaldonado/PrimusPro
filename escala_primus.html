<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Escala Semanal — Primus Peixaria</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');

  :root{
    --bg:#f7f6f3;
    --surface:#ffffff;
    --surface2:#f0efe9;
    --border:#e2e0d8;
    --text:#1a1916;
    --text2:#6b6960;
    --text3:#a8a69e;
    --teal:#1D9E75;
    --teal-bg:#E1F5EE;
    --red:#A32D2D;
    --red-bg:#FCEBEB;
    --radius:10px;
    --radius-sm:6px;
  }

  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

  header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
  .logo{display:flex;align-items:center;gap:10px}
  .logo-icon{width:32px;height:32px;background:var(--text);border-radius:8px;display:flex;align-items:center;justify-content:center}
  .logo-icon svg{width:18px;height:18px;fill:var(--bg)}
  .logo-name{font-size:15px;font-weight:600;letter-spacing:-.01em}
  .logo-sub{font-size:12px;color:var(--text2);margin-top:1px}
  .save-badge{font-size:11px;padding:4px 10px;border-radius:20px;background:var(--teal-bg);color:var(--teal);font-weight:500;transition:all .3s}
  .save-badge.saving{background:#FFF8E1;color:#B45309}
  .save-badge.error{background:var(--red-bg);color:var(--red)}

  main{max-width:1100px;margin:0 auto;padding:24px 20px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px}
  .section-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:12px}

  .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .toolbar input[type=text]{flex:1;min-width:150px;max-width:200px;height:38px;border:1px solid var(--border);border-radius:var(--radius-sm);padding:0 12px;font-family:inherit;font-size:14px;color:var(--text);background:var(--surface);outline:none;transition:border .15s}
  .toolbar input[type=text]:focus{border-color:#999}
  .toolbar select{height:38px;border:1px solid var(--border);border-radius:var(--radius-sm);padding:0 10px;font-family:inherit;font-size:14px;color:var(--text);background:var(--surface);outline:none;cursor:pointer}
  .btn{height:38px;padding:0 16px;border-radius:var(--radius-sm);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:opacity .15s}
  .btn:hover{opacity:.85}
  .btn-add{background:var(--text);color:var(--bg)}
  .btn-export{background:var(--teal-bg);color:var(--teal);border:1px solid #b2e4d2}
  .btn-clear{background:var(--red-bg);color:var(--red);border:1px solid #f0b8b8}

  .chips{display:flex;flex-wrap:wrap;gap:6px;min-height:32px;align-items:center}
  .chip{display:inline-flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px 5px 10px;font-size:13px}
  .chip-role{font-size:11px;color:var(--text2)}
  .chip-rm{background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px;line-height:1;padding:0 0 0 4px;transition:color .15s}
  .chip-rm:hover{color:var(--red)}
  .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .empty-msg{font-size:13px;color:var(--text3);font-style:italic}

  .grid-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;min-width:600px}
  th{background:var(--surface2);color:var(--text2);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;padding:10px 8px;border:1px solid var(--border);text-align:center}
  td{padding:5px;border:1px solid var(--border);vertical-align:middle;text-align:center}
  td.nm{font-size:13px;font-weight:500;min-width:130px;padding:8px 10px;text-align:left}
  td.nm .sub{font-size:10px;color:var(--text3);font-weight:400;margin-top:1px}

  .toggle{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:8px;cursor:pointer;border:1.5px solid var(--border);background:var(--surface2);color:var(--text3);font-size:16px;transition:all .15s;user-select:none}
  .toggle:hover{border-color:#aaa;color:var(--text2)}
  .toggle.on{background:var(--teal-bg);border-color:#7fd4b5;color:var(--teal);font-size:14px;font-weight:600}

  .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px}
  .metric{background:var(--surface2);border-radius:var(--radius-sm);padding:12px 14px}
  .metric-label{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:4px}
  .metric-val{font-size:22px;font-weight:600;color:var(--text)}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
    </div>
    <div>
      <div class="logo-name">Primus Peixaria</div>
      <div class="logo-sub">Escala semanal</div>
    </div>
  </div>
  <div class="save-badge" id="saveBadge">carregando...</div>
</header>

<main>
  <div class="card">
    <div class="section-label">Adicionar funcionário</div>
    <div class="toolbar">
      <input type="text" id="empInput" placeholder="Nome do funcionário" onkeydown="if(event.key==='Enter')addEmp()"/>
      <select id="roleSelect">
        <option value="Cozinha">Cozinha</option>
        <option value="Cumim">Cumim</option>
        <option value="Garçom">Garçom</option>
        <option value="Recepção">Recepção</option>
        <option value="Atendimento">Atendimento</option>
        <option value="Caixa">Caixa</option>
        <option value="Parquinho">Parquinho</option>
        <option value="Limpeza">Limpeza</option>
        <option value="Gerência">Gerência</option>
      </select>
      <button class="btn btn-add" onclick="addEmp()">+ Adicionar</button>
      <button class="btn btn-export" onclick="exportarPDF()">Exportar PDF</button>
      <button class="btn btn-clear" onclick="limparSemana()">Limpar semana</button>
    </div>
  </div>

  <div class="card">
    <div class="section-label">Equipe cadastrada</div>
    <div class="chips" id="empList"><span class="empty-msg">Nenhum funcionário ainda.</span></div>
  </div>

  <div class="card">
    <div class="section-label">Escala da semana — clique no dia para marcar</div>
    <div class="grid-wrap">
      <table>
        <thead><tr id="headerRow"></tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <div class="section-label">Resumo</div>
    <div class="metrics" id="metrics"></div>
  </div>
</main>

<script>
const DIAS=['Segunda','Terça','Quarta','Quinta','Sexta','Sábado','Domingo'];
const DIAS_CURTO=['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
const ROLE_CORES={
  'Cozinha':'#E24B4A','Cumim':'#D85A30','Garçom':'#185FA5','Recepção':'#D4537E',
  'Atendimento':'#1D9E75','Caixa':'#854F0B','Parquinho':'#639922','Limpeza':'#5F5E5A','Gerência':'#533AB7'
};
const SK='primus-employees';

let emps=[];
let scale={};

function badge(msg,type){
  const el=document.getElementById('saveBadge');
  el.textContent=msg;
  el.className='save-badge'+(type?' '+type:'');
}

let storageOk=false;
try{localStorage.setItem('_t','1');localStorage.removeItem('_t');storageOk=true;}catch(e){}

function lsGet(k){try{return storageOk?localStorage.getItem(k):null;}catch(e){return null;}}
function lsSet(k,v){try{if(storageOk)localStorage.setItem(k,v);}catch(e){}}

function load(){
  try{
    const raw=lsGet(SK);
    if(raw) emps=JSON.parse(raw)||[];
    emps.forEach(e=>{
      if(!scale[e.name]){
        scale[e.name]={};
        DIAS.forEach(d=>scale[e.name][d]=false);
      }
    });
    badge(storageOk?'dados carregados':'modo sem armazenamento');
    setTimeout(()=>badge('pronto'),1500);
  } catch(err){badge('pronto');}
  render();
}

function save(){
  try{
    lsSet(SK,JSON.stringify(emps));
    badge(storageOk?'salvo':'em memória (sem persistência)');
    setTimeout(()=>badge('pronto'),2000);
  } catch(err){badge('pronto');}
}

function addEmp(){
  const nm=document.getElementById('empInput').value.trim();
  const rl=document.getElementById('roleSelect').value;
  if(!nm) return;
  if(emps.find(e=>e.name===nm)){alert('Já cadastrado.');return;}
  emps.push({name:nm,role:rl});
  scale[nm]={};
  DIAS.forEach(d=>scale[nm][d]=false);
  document.getElementById('empInput').value='';
  save();render();
}

function removeEmp(nm){
  if(!confirm('Remover '+nm+'?')) return;
  emps=emps.filter(e=>e.name!==nm);
  delete scale[nm];
  save();render();
}

function limparSemana(){
  if(!emps.length) return;
  if(!confirm('Desmarcar todos os dias de todos os funcionários?')) return;
  emps.forEach(e=>{DIAS.forEach(d=>scale[e.name][d]=false);});
  render();
}


function toggleDia(nm,dia){
  scale[nm][dia]=!scale[nm][dia];
  render();
}

function render(){
  const cl=document.getElementById('empList');
  cl.innerHTML='';
  if(!emps.length){
    cl.innerHTML='<span class="empty-msg">Nenhum funcionário cadastrado.</span>';
  } else {
    emps.forEach(e=>{
      const cor=ROLE_CORES[e.role]||'#888';
      const c=document.createElement('div');
      c.className='chip';
      c.innerHTML=`<div class="dot" style="background:${cor}"></div><span>${e.name}</span><span class="chip-role">${e.role}</span><button class="chip-rm" onclick="removeEmp('${e.name}')">×</button>`;
      cl.appendChild(c);
    });
  }

  document.getElementById('headerRow').innerHTML=
    `<th style="width:140px;text-align:left">Funcionário</th>`+
    DIAS.map((d,i)=>`<th title="${d}">${DIAS_CURTO[i]}</th>`).join('');

  const tb=document.getElementById('tableBody');
  tb.innerHTML='';
  emps.forEach(e=>{
    const cor=ROLE_CORES[e.role]||'#888';
    const tr=document.createElement('tr');
    let cells=`<td class="nm"><div style="display:flex;align-items:center;gap:7px"><div class="dot" style="background:${cor}"></div>${e.name}</div><div class="sub">${e.role}</div></td>`;
    DIAS.forEach(d=>{
      const on=scale[e.name]&&scale[e.name][d];
      cells+=`<td><div class="toggle${on?' on':''}" onclick="toggleDia('${e.name}','${d}')" title="${d}">${on?'✓':'+'}</div></td>`;
    });
    tr.innerHTML=cells;
    tb.appendChild(tr);
  });

  let totalMarcados=0;
  emps.forEach(e=>{DIAS.forEach(d=>{if(scale[e.name]&&scale[e.name][d]) totalMarcados++;});});
  const roles=[...new Set(emps.map(e=>e.role))];
  let html=`<div class="metric"><div class="metric-label">Funcionários</div><div class="metric-val">${emps.length}</div></div>`;
  html+=`<div class="metric"><div class="metric-label">Dias marcados</div><div class="metric-val">${totalMarcados}</div></div>`;
  roles.forEach(r=>{
    const cnt=emps.filter(e=>e.role===r).length;
    html+=`<div class="metric"><div class="metric-label">${r}</div><div class="metric-val">${cnt}</div></div>`;
  });
  document.getElementById('metrics').innerHTML=html;
}

function exportarPDF(){
  if(!emps.length){alert('Adicione funcionários primeiro.');return;}
  const roles=[...new Set(emps.map(e=>e.role))];
  const EMOJI={'Cozinha':'🍳','Cumim':'🔪','Garçom':'🍽️','Recepção':'👋','Atendimento':'😊','Caixa':'💰','Parquinho':'🎠','Limpeza':'🧹','Gerência':'⭐'};
